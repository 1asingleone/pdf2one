<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pdf2one — PDF 合并工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f3f4f6;
  --surface: #ffffff;
  --surface-hover: #f9fafb;
  --border: #e5e7eb;
  --border-light: #f0f0f0;
  --text: #111827;
  --text-secondary: #6b7280;
  --text-tertiary: #9ca3af;
  --accent: #dc2626;
  --accent-hover: #b91c1c;
  --accent-light: #fef2f2;
  --success: #059669;
  --error: #dc2626;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --font-heading: 'Instrument Sans', sans-serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:32px 20px}
.container{width:100%;max-width:800px;animation:fadeUp .5s ease-out}
header{margin-bottom:28px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
header h1{font-family:var(--font-heading);font-size:26px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
header h1 span{color:var(--accent)}
header .tagline{font-size:14px;color:var(--text-secondary);font-weight:400}
header .badge{font-size:11px;padding:3px 10px;background:var(--accent-light);color:var(--accent);border-radius:100px;font-weight:500;letter-spacing:0.02em;margin-left:auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow var(--transition)}
.card:hover{box-shadow:var(--shadow-md)}
.drop-zone{position:relative;padding:36px 24px;text-align:center;cursor:pointer;transition:all var(--transition);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.drop-zone::before{content:'';position:absolute;inset:12px;border:2px dashed var(--border);border-radius:var(--radius-md);transition:all var(--transition);pointer-events:none}
.drop-zone:hover::before,.drop-zone.dragover::before{border-color:var(--accent);border-style:solid}
.drop-zone.dragover{background:var(--accent-light)}
.drop-zone.dragover::before{border-color:var(--accent)}
.drop-zone .icon{font-size:36px;line-height:1;margin-bottom:8px;position:relative}
.drop-zone .label{font-size:15px;font-weight:500;color:var(--text);position:relative}
.drop-zone .sublabel{font-size:13px;color:var(--text-tertiary);margin-top:4px;position:relative}
.drop-zone .file-btn{position:relative;margin-top:12px;padding:7px 20px;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--accent);background:var(--accent-light);border:1px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition)}
.drop-zone .file-btn:hover{background:var(--accent);color:#fff}
input[type="file"]{display:none}
.file-list-wrap{display:none;flex-direction:column;margin-top:12px}
.file-list-wrap.visible{display:flex}
.file-list-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
.file-list-header .count{font-size:14px;font-weight:600;color:var(--text)}
.file-list-header .count em{font-style:normal;color:var(--accent)}
.file-list-header .btn-clear{font-size:12px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;font-family:var(--font-body);transition:color var(--transition);padding:2px 6px;border-radius:4px}
.file-list-header .btn-clear:hover{color:var(--error)}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 18px;border-top:1px solid var(--border-light);transition:background var(--transition);user-select:none;animation:slideIn .25s ease-out}
.file-item:first-child{border-top:none}
.file-item:hover{background:var(--surface-hover)}
.file-item.dragging{opacity:0.3}
.file-item.drag-over{border-top:2px solid var(--accent)}
.file-item .idx{width:22px;font-size:12px;color:var(--text-tertiary);text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.file-item .drag-handle{cursor:grab;color:var(--text-tertiary);font-size:14px;padding:2px;flex-shrink:0;line-height:1;opacity:0.4;transition:opacity var(--transition)}
.file-item:hover .drag-handle{opacity:0.8}
.file-item .info{flex:1;min-width:0}
.file-item .name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .meta{font-size:12px;color:var(--text-tertiary);margin-top:1px}
.file-item .btn-remove{background:none;border:none;color:var(--text-tertiary);font-size:15px;cursor:pointer;padding:4px;flex-shrink:0;border-radius:4px;transition:all var(--transition);line-height:1;opacity:0}
.file-item:hover .btn-remove{opacity:1}
.file-item .btn-remove:hover{color:var(--error);background:var(--error-bg)}
.filename-row{display:flex;align-items:center;gap:10px;justify-content:center;padding:0 18px 14px;margin-top:-4px}.filename-row label{font-size:13px;color:#6b7280;white-space:nowrap}.filename-row input{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;width:200px;outline:none}.filename-row input:focus{border-color:#dc2626;box-shadow:0 0 0 2px rgba(220,38,38,0.1)}.action-area{display:flex;flex-direction:column;gap:14px;padding:18px;margin-top:12px}
.merge-btn{width:100%;padding:11px 0;font-family:var(--font-heading);font-size:15px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition);letter-spacing:0.01em;position:relative}
.merge-btn:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.merge-btn:active:not(:disabled){transform:translateY(0)}
.merge-btn:disabled{background:#fca5a5;cursor:not-allowed;transform:none;box-shadow:none}
.merge-btn .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;position:absolute;left:50%;top:50%;margin:-8px 0 0 -8px}
.merge-btn.loading .label{visibility:hidden}
.merge-btn.loading .spinner{display:block}
.progress-wrap{display:none}
.progress-wrap.visible{display:block}
.progress-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:var(--accent);border-radius:4px;transition:width .4s ease-out}
.progress-label{font-size:12px;color:var(--text-secondary);margin-top:6px;text-align:center}
.status{font-size:13px;color:var(--text-secondary);min-height:20px;display:flex;align-items:center;gap:6px;justify-content:center}
.status.success{color:var(--success)}
.status.error{color:var(--error)}
.summary-bar{display:none;padding:12px 18px;font-size:13px;gap:8px;align-items:center;border-top:1px solid var(--border-light)}
.summary-bar.visible{display:flex}
.summary-bar.success{background:var(--success-bg, #ecfdf5);color:var(--success)}
.summary-bar.error{background:var(--error-bg, #fef2f2);color:var(--error)}
.summary-bar .btn-new{font-size:12px;padding:4px 12px;border-radius:100px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:var(--font-body);transition:background var(--transition);margin-left:auto}
.summary-bar .btn-new:hover{background:var(--accent-hover)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:500px){body{padding:20px 12px}}
</style>

<body>
<div class="container">
  <header>
    <h1>pdf<span>2</span>one</h1>
    <span class="tagline">PDF 合并</span>
    <span class="badge">纯浏览器端</span>
  </header>

  <div class="card drop-zone" id="dropZone">
    <div class="icon">&#x1F4C4;</div>
    <div class="label">拖拽 .pdf 文件到此处</div>
    <div class="sublabel">或点击下方按钮选择</div>
    <button class="file-btn" id="selectBtn">选择文件</button>
    <input type="file" id="fileInput" multiple accept=".pdf">
  </div>

  <div class="card file-list-wrap" id="fileListWrap">
    <div class="file-list-header">
      <span class="count">已选择 <em id="fileCount">0</em> 个文件</span>
      <button class="btn-clear" id="btnClear">清空</button>
    </div>
    <div id="fileList"></div>
  </div>

  <div class="action-area" id="actionArea" style="display:none">
    <div class="filename-row" id="filenameRow" style="display:none">
      <label for="filenameInput">输出文件名:</label>
      <input type="text" id="filenameInput" value="合并文档">
    </div>
    <button class="merge-btn" id="mergeBtn">
      <span class="label">合并并下载</span>
      <span class="spinner"></span>
    </button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="summary-bar" id="summaryBar">
    <span id="summaryMsg"></span>
    <button class="btn-new" id="btnNew">重新开始</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const dropZone = $('dropZone');
const fileInput = $('fileInput');
const selectBtn = $('selectBtn');
const fileListWrap = $('fileListWrap');
const fileList = $('fileList');
const fileCount = $('fileCount');
const btnClear = $('btnClear');
const actionArea = $('actionArea');
const mergeBtn = $('mergeBtn');
const progressWrap = $('progressWrap');
const progressFill = $('progressFill');
const progressLabel = $('progressLabel');
const statusEl = $('status');
const summaryBar = $('summaryBar');
const summaryMsg = $('summaryMsg');
const btnNew = $('btnNew');

let fileItems = [];

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1024*1024) return (b/1024).toFixed(1)+' KB'; return (b/1024/1024).toFixed(1)+' MB'; }
function setStatus(msg, type) { statusEl.innerHTML = msg ? escapeHtml(msg) : ''; statusEl.className = 'status' + (type ? ' '+type : ''); }
function updateProgress(pct, msg) { progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%'; progressLabel.textContent = msg || ''; progressWrap.classList.add('visible'); }
function showSummary(msg, type) { summaryMsg.textContent = msg; summaryBar.className = 'summary-bar visible ' + (type || ''); }

selectBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files.length) addFiles(fileInput.files); fileInput.value = ''; });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
btnClear.addEventListener('click', () => { fileItems = []; render(); });
btnNew.addEventListener('click', () => { fileItems = []; render(); summaryBar.className = 'summary-bar'; setStatus(''); progressWrap.classList.remove('visible'); });

function addFiles(input) {
  let added = false;
  for (const f of input) {
    if (!f.name.toLowerCase().endsWith('.pdf')) continue;
    if (fileItems.some(it => it.file === f || (it.name === f.name && it.size === f.size))) continue;
    fileItems.push({ file: f, name: f.name, size: f.size });
    added = true;
  }
  if (added) render();
}

function render() {
  const has = fileItems.length > 0;
  fileListWrap.classList.toggle('visible', has);
  actionArea.style.display = has ? 'block' : 'none';
  document.getElementById('filenameRow').style.display = has ? 'flex' : 'none';
  if (!has) { fileList.innerHTML = ''; fileCount.textContent = '0'; return; }
  fileCount.textContent = fileItems.length;
  fileList.innerHTML = '';
  fileItems.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'file-item'; div.draggable = true; div.dataset.index = idx;
    div.innerHTML = '<span class="idx">'+(idx+1)+'</span><span class="drag-handle">&#x22EF;</span><div class="info"><div class="name">'+escapeHtml(item.name)+'</div><div class="meta">'+formatSize(item.size)+'</div></div><button class="btn-remove">&#x2715;</button>';
    div.addEventListener('dragstart', e => { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', idx); setTimeout(() => div.classList.add('dragging'), 0); });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => { e.preventDefault(); div.classList.remove('drag-over'); const fi = parseInt(e.dataTransfer.getData('text/plain')); const ti = parseInt(div.dataset.index); if (fi !== ti) { const [m] = fileItems.splice(fi, 1); fileItems.splice(ti, 0, m); render(); } });
    div.querySelector('.btn-remove').addEventListener('click', () => { fileItems.splice(idx, 1); render(); });
    fileList.appendChild(div);
  });
}

async function mergeAndDownload() {
  if (!fileItems.length) { setStatus('请先选择 .pdf 文件', 'error'); return; }
  if (typeof PDFDocument === 'undefined') { setStatus('PDF-lib 库加载失败，请检查网络', 'error'); return; }
  mergeBtn.classList.add('loading'); mergeBtn.disabled = true; setStatus(''); summaryBar.className = 'summary-bar'; progressWrap.classList.remove('visible');
  try {
    updateProgress(5, '正在读取文件…');
    const fileBuffers = [];
    for (const item of fileItems) {
      fileBuffers.push(await item.file.arrayBuffer());
    }
    updateProgress(10, '已加载 ' + fileBuffers.length + ' 个 PDF，开始合并…');
    const mergedPdf = await PDFDocument.create();
    let totalPages = 0;
    for (let i = 0; i < fileBuffers.length; i++) {
      const pct = 10 + Math.round(((i + 0.5) / fileBuffers.length) * 70);
      updateProgress(pct, '正在合并第 ' + (i + 1) + '/' + fileBuffers.length + ' 个 PDF…');
      const srcDoc = await PDFDocument.load(fileBuffers[i], { ignoreEncryption: true });
      const indices = srcDoc.getPageIndices();
      const pages = await mergedPdf.copyPages(srcDoc, indices);
      pages.forEach(p => mergedPdf.addPage(p));
      totalPages += indices.length;
    }
    updateProgress(85, '正在生成 PDF…');
    const pdfBytes = await mergedPdf.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    document.getElementById('filenameInput').value = fileItems.length === 1 ? fileItems[0].name.replace(/\.pdf$/i, '') + '_merged' : '合并文档';
    const fileName = (document.getElementById('filenameInput').value || '合并文档') + '.pdf';
    if (typeof saveAs !== 'undefined') { saveAs(blob, fileName); }
    else { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileName; a.click(); URL.revokeObjectURL(url); }
    updateProgress(100, '合并完成！共 ' + totalPages + ' 页');
    setStatus('下载已启动', 'success');
    showSummary('合并成功: ' + fileName + '（' + totalPages + ' 页）', 'success');
  } catch (err) {
    console.error(err);
    setStatus(err.message || err, 'error');
    showSummary('合并失败: ' + (err.message || err), 'error');
  } finally {
    mergeBtn.classList.remove('loading'); mergeBtn.disabled = false;
  }
}

mergeBtn.addEventListener('click', mergeAndDownload);
</script>
</body>
</html>
